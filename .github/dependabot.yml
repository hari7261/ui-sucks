version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Kolkata'
    open-pull-requests-limit: 5
    rebase-strategy: 'auto'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      npm-non-major:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:15'
      timezone: 'Asia/Kolkata'
    open-pull-requests-limit: 5
    rebase-strategy: 'auto'
    commit-message:
      prefix: 'chore(ci)'
    groups:
      github-actions-non-major:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
