name: Bug report
description: Report a reproducible defect in the library
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide steps or a minimal reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include React version, package version, browser, and bundler
